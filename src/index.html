        // Diff computation for fix/rewrite actions
        function computeDiff(original, modified) {
            var origLines = original.split('\n');
            var modLines = modified.split('\n');
            var result = [];
            var maxLen = Math.max(origLines.length, modLines.length);
            for (var i = 0; i < maxLen; i++) {
                var oLine = i < origLines.length ? origLines[i] : null;
                var mLine = i < modLines.length ? modLines[i] : null;
                if (oLine === mLine) {
                    result.push({ type: 'ctx', text: oLine });
                } else {
                    if (oLine !== null) result.push({ type: 'del', text: oLine });
                    if (mLine !== null) result.push({ type: 'add', text: mLine });
                }
            }
            return result;
        }

        function extractCodeBlock(text) {
            var match = text.match(/```\w*\n([\s\S]*?)```/);
            return match ? match[1].trim() : null;
        }

        function renderMessages() {
            // Cap client-side history at 50 messages
            if (messageHistory.length > 50) {
                messageHistory = messageHistory.slice(-50);
            }
            let html = '';
            for (let i = 0; i < messageHistory.length; i++) {
                const msg = messageHistory[i];
                if (msg.role === 'user') {
                    const shown = escapeHtml(msg.displayContent || msg.content);
                    html += `<div class="msg">
        <div class="msg-user"><strong>You:</strong> ${shown}</div>
        </div>`;
                } else {
                    // Check if preceding user message was a code-modifying action
                    var prevMsg = i > 0 ? messageHistory[i - 1] : null;
                    var isDiffAction = prevMsg && ['fix', 'rewrite', 'optimize'].includes(prevMsg.action);
                    var responseCode = extractCodeBlock(msg.content);
                    // Also show diff when any action produces a code block and context was code
                    var isCodeContext = currentContext && /[{}\[\]();]|function |const |let |def |class |=>/.test(currentContext);
                    var showDiff = (isDiffAction || (responseCode && isCodeContext && prevMsg && prevMsg.action)) && currentContext && responseCode;

                    if (showDiff) {
                        var diffLines = computeDiff(currentContext.trim(), responseCode);
                        var diffHtml = '<div class="diff-container">';
                        diffHtml += '<div class="diff-header">Changes</div>';
                        for (var d = 0; d < diffLines.length; d++) {
                            var dl = diffLines[d];
                            var prefix = dl.type === 'add' ? '+' : (dl.type === 'del' ? '-' : ' ');
                            var cls = 'diff-' + dl.type;
                            diffHtml += '<div class="diff-line ' + cls + '">' + prefix + ' ' + escapeHtml(dl.text).replace(/<br>/g, '') + '</div>';
                        }
                        diffHtml += '<div class="diff-actions">';
                        diffHtml += '<button class="diff-accept" onclick="acceptDiff(' + i + ')">✓ Accept</button>';
                        diffHtml += '<button class="diff-reject" onclick="deleteMessage(' + i + ')">✕ Reject</button>';
                        diffHtml += '</div></div>';
                        html += `<div class="msg">
            <div class="msg-assistant">${diffHtml}</div>
            <div class="msg-toolbar">
                <button class="copy-btn" onclick="copyResponse(${i})">Copy</button>
                <button class="save-btn" onclick="saveToMemory(${i})">💾 Save</button>
                <button class="chain-btn" onclick="toggleChainMenu(this)">→ Chain</button>
                <div class="chain-menu" style="display:none">

                    <button onclick="chainAction(${i},'rewrite')">Rewrite</button>
                    <button onclick="chainAction(${i},'simplify')">Simplify</button>
                    <button onclick="chainAction(${i},'translate')">Translate</button>
                    <button onclick="chainAction(${i},'summarize')">Sum</button>
                    <button onclick="chainAction(${i},'explain')">Explain</button>
                    <button onclick="chainAction(${i},'reply')">Reply</button>
                </div>
            </div>
        </div>`;
                    } else {
                        html += `<div class="msg">
            <div class="msg-assistant">${renderMarkdown(msg.content)}</div>
            <div class="msg-toolbar">
                <button class="copy-btn" onclick="copyResponse(${i})">Copy</button>
                <button onclick="applyInPlace(${i})">Apply</button>
                <button class="save-btn" onclick="saveToMemory(${i})">💾 Save</button>
                <button class="chain-btn" onclick="toggleChainMenu(this)">→ Chain</button>
                <button onclick="deleteMessage(${i})">✕</button>
                <div class="chain-menu" style="display:none">
                    <button onclick="chainAction(${i},'fix')">Fix</button>
                    <button onclick="chainAction(${i},'rewrite')">Rewrite</button>
                    <button onclick="chainAction(${i},'simplify')">Simplify</button>
                    <button onclick="chainAction(${i},'translate')">Translate</button>
                    <button onclick="chainAction(${i},'summarize')">Sum</button>
                    <button onclick="chainAction(${i},'explain')">Explain</button>
                    <button onclick="chainAction(${i},'reply')">Reply</button>
                </div>
            </div>
        </div>`;
                    }
                }
            }
            chatArea.innerHTML = html || '<div class="empty-state">Ready. Highlight → invoke → command.</div>';
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Feature 7: Clipboard queue — accumulate snippets and send all at once
        let clipQueue = [];
        function renderClipQueue() {
            const addBtn = document.getElementById('clip-queue-add');

        document.getElementById('clip-queue-send').addEventListener('click', () => {

            // Concatenate all queued items as context
            const combined = clipQueue.map((item, i) => `--- Snippet ${i + 1} ---\n${item}`).join('\n\n');
            latestHighlight = combined;
            currentContext = combined;
            selectionCount = clipQueue.length;

        window.deleteMessage = function (idx) {
            // Delete this message and its paired user/assistant message
            if (messageHistory[idx]?.role === 'assistant' && idx > 0 && messageHistory[idx - 1]?.role === 'user') {
                messageHistory.splice(idx - 1, 2);

        window.saveToMemory = function (idx) {
            const msg = messageHistory[idx];

            // Find the preceding user message for context
            let userQuery = '';
            let actionType = '';
            for (let i = idx - 1; i >= 0; i--) {
                if (messageHistory[i].role === 'user') {
                    userQuery = messageHistory[i].content;
                    actionType = messageHistory[i].action || '';
                    break;
                }
            }

            const lesson = userQuery
                ? `Q: ${userQuery}\nA: ${msg.content}`
                : msg.content;

            // Feature 3: Auto-tag with language and action
            const langTag = window._detectedLanguage ? window._detectedLanguage.lang : '';
            const tags = ['locus', langTag, actionType, 'auto-persist'].filter(Boolean).join(',');

            ipcRenderer.send('persist-to-cortex', {
                content: lesson,
                tags: tags
            });
        };

        // #4: Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') ipcRenderer.send('dismiss');

            // Ctrl+Enter: send current input
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                sendBtn.click();
                return;
            }

            // Ctrl+1-6: quick action buttons
            if (e.ctrlKey && e.key >= '1' && e.key <= '6') {
                e.preventDefault();
                const actions = ['fix', 'explain', 'rewrite', 'summarize', 'test', 'document'];
                const idx = parseInt(e.key) - 1;
                if (actions[idx]) {
                    const btn = document.querySelector(`[data-action="${actions[idx]}"]`);
                    if (btn) btn.click();
                }
                return;
            }

            // Ctrl+S: screenshot capture
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                document.getElementById('screenshot-btn').click();
                return;
            }

            // Ctrl+E: export conversation
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                document.getElementById('export-btn').click();
                return;
            }
        });

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        // For use in HTML attributes (no <br> injection)
        function escapeHtmlAttr(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── v3.6 Feature 1: Token Counter ────────────────────
        let sessionTokens = 0;
        function estimateTokens(text) {
            // Rough estimate: 1 token ≈ 4 chars for English
            return Math.ceil((text || '').length / 4);
        }
        function updateTokenBadge(text) {
            const tokens = estimateTokens(text);
            sessionTokens += tokens;
            const badge = document.getElementById('token-badge');
            if (sessionTokens > 1000) {
                badge.textContent = (sessionTokens / 1000).toFixed(1) + 'k tok';
            } else {
                badge.textContent = sessionTokens + ' tok';
            }
        }
        // Token counting is now handled inline in the main chat-chunk listener above
        // to avoid duplicate ipcRenderer.on('chat-chunk') registrations.

        // ── v3.6 Feature 2: Quick Response Actions ───────────
        const responseMenu = document.createElement('div');
        responseMenu.className = 'response-menu';
        responseMenu.innerHTML = `
            <button data-action="copy-code">📋 Copy Code Block</button>
            <button data-action="copy-all">📄 Copy Full Response</button>
            <button data-action="save-snippet">💾 Save to CortexDB</button>
            <button data-action="run-code">▶️ Run Code</button>
        `;
        document.body.appendChild(responseMenu);

        let rightClickTarget = null;
        document.getElementById('chat').addEventListener('contextmenu', (e) => {
            const msgEl = e.target.closest('.msg');
            if (!msgEl || !msgEl.classList.contains('assistant')) return;
            e.preventDefault();
            rightClickTarget = msgEl;
            responseMenu.style.display = 'block';
            responseMenu.style.left = e.clientX + 'px';
            responseMenu.style.top = e.clientY + 'px';
        });
        document.addEventListener('click', () => { responseMenu.style.display = 'none'; });

        responseMenu.addEventListener('click', (e) => {
            const action = e.target.dataset.action;
            if (!action || !rightClickTarget) return;
            const fullText = rightClickTarget.textContent || '';
            // Extract code blocks
            const codeEl = rightClickTarget.querySelector('pre code, code');
            const codeText = codeEl ? codeEl.textContent : '';

            if (action === 'copy-code') {
                navigator.clipboard.writeText(codeText || fullText);
            } else if (action === 'copy-all') {
                navigator.clipboard.writeText(fullText);
            } else if (action === 'save-snippet') {
                ipcRenderer.send('save-cortex', fullText);
            } else if (action === 'run-code') {
                if (codeText) {
                    // Try to detect language from code block class
                    const langClass = codeEl ? codeEl.className.match(/language-(\w+)/) : null;
                    const lang = langClass ? langClass[1] : 'python';
                    ipcRenderer.send('run-code', { code: codeText, language: lang });
                }
            }
            responseMenu.style.display = 'none';
        });

        // ── v3.6 Feature 3: Code Runner output ───────────────
        ipcRenderer.on('code-run-result', (ev, result) => {
            const area = document.getElementById('chat');
            const div = document.createElement('div');
            if (result.error) {
                div.className = 'code-output error';
                div.textContent = '❌ ' + result.error;
            } else {
                div.className = 'code-output ' + (result.exitCode === 0 ? 'success' : 'error');
                let output = '';
                if (result.stdout) output += result.stdout;
                if (result.stderr) output += (output ? '\n' : '') + '⚠ ' + result.stderr;
                div.textContent = (result.exitCode === 0 ? '✓ ' : '✗ exit ' + result.exitCode + '\n') + (output || '(no output)');
            }
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        });

        // ── v3.6 Feature 4: Git Context ──────────────────────
        ipcRenderer.on('git-context', (ev, data) => {
            const area = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'code-output ' + (data.error ? 'error' : 'success');
            if (data.error) {
                div.textContent = '📁 Git: ' + data.error;
            } else {
                div.textContent = `📁 ${data.repo}\n📄 ${data.file}\n\n${data.status}\n\n${data.diff}`;
                // Also inject into context
                const input = document.getElementById('cmd');
                if (input) {
                    input.value = (input.value ? input.value + '\n\n' : '') +
                        '[Git Diff]\n```\n' + data.diff.substring(0, 3000) + '\n```';
                }
            }
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        });

        // ── v3.6 Feature 5: Session Stats ────────────────────
        ipcRenderer.on('session-stats', (ev, stats) => {
            const area = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'code-output success';
            let text = `📊 Session Stats — ${stats.date}\n`;
            text += `Messages: ${stats.messages} | Sessions: ${stats.sessionsToday}\n`;
            text += `\nModel Usage:\n`;
            for (const [m, c] of Object.entries(stats.modelUsage || {})) {
                text += `  ${m}: ${c} msgs\n`;
            }
            if (Object.keys(stats.actionUsage || {}).length > 0) {
                text += `\nAction Usage:\n`;
                for (const [a, c] of Object.entries(stats.actionUsage)) {
                    text += `  ${a}: ${c}x\n`;
                }
            }
            div.textContent = text;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        });

        // ── v3.6 Feature 6: Multi-Model Compare ─────────────
        ipcRenderer.on('compare-chunk', (ev, { idx, chunk }) => {
            let panel = document.getElementById('compare-panel-' + idx);
            if (!panel) {
                // Create compare container on first chunk
                let container = document.getElementById('compare-container');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'compare-container';
                    container.className = 'compare-container';
                    document.getElementById('chat').appendChild(container);
                }
                panel = document.createElement('div');
                panel.id = 'compare-panel-' + idx;
                panel.className = 'compare-panel';
                panel.innerHTML = '<div class="label">Model ' + (idx + 1) + '</div>';
                container.appendChild(panel);
            }
            panel.innerHTML += escapeHtml(chunk);
        });
        ipcRenderer.on('compare-done', (ev, { idx, model }) => {
            const panel = document.getElementById('compare-panel-' + idx);
            if (panel) {
                panel.querySelector('.label').textContent = model;
            }
        });

        // ── v3.6 Feature 7: Image OCR ────────────────────────
        ipcRenderer.on('ocr-result', (ev, result) => {
            if (result.error) {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<div class="msg-assistant" style="color:#ef4444">🔍 OCR failed: ${escapeHtml(result.error)}</div>`;
                chatArea.appendChild(div);
                chatArea.scrollTop = chatArea.scrollHeight;
                return;
            }
            const text = result.text;
            // Inject into currentContext so next LLM message includes it
            currentContext = currentContext ? currentContext + '\n---\n' + text : text;
            const display = currentContext.length > 300 ? currentContext.substring(0, 300) + '…' : currentContext;
            contextBox.textContent = display;
            contextBox.style.color = '#d4d4d8';
            updateCtxChars();

            // Show OCR output in chat with a Q&A hint
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `
                <div class="msg-user"><strong>OCR Scan</strong></div>
                <div class="msg-assistant" style="font-family:'JetBrains Mono',monospace;font-size:11px;white-space:pre-wrap;opacity:0.85">${escapeHtml(text)}</div>
                <div class="msg-assistant" style="font-size:10px;color:#475569;margin-top:4px">📌 Context loaded — ask a question about this image</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;

            // Pre-focus the input so user can type right away
            cmdInput.focus();
        });
    </script>
</body>

</html>
