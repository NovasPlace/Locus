<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: rgba(14, 14, 16, 0.94);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            height: 100vh;
            padding: 0 4px;
            overflow: hidden;
            animation: popIn 0.12s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(4px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .toolbar {
            display: flex;
            gap: 3px;
            align-items: center;
            width: 100%;
        }

        .type-badge {
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 2px;
            flex-shrink: 0;
        }

        .type-code {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .type-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .type-text {
            background: rgba(16, 163, 127, 0.2);
            color: #10a37f;
        }

        .btn {
            background: rgba(16, 163, 127, 0.12);
            border: 1px solid rgba(16, 163, 127, 0.25);
            color: #10a37f;
            padding: 4px 9px;
            font-size: 11px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.1s;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(16, 163, 127, 0.3);
            border-color: #10a37f;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-chat {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #a1a1aa;
            margin-left: auto;
        }

        .btn-chat:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #e4e4e7;
        }

        .sep {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.08);
            margin: 0 2px;
        }

        .btn-custom {
            background: rgba(234, 179, 8, 0.1);
            border: 1px dashed rgba(234, 179, 8, 0.35);
            color: #eab308;
        }

        .btn-custom:hover {
            background: rgba(234, 179, 8, 0.25);
            border-color: #eab308;
        }
    </style>
</head>

<body>
    <div class="toolbar" id="toolbar"></div>

    <script>
        const { ipcRenderer } = require('electron');

        const ACTION_SETS = {
            code: [
                { label: 'Fix', action: 'fix' },
                { label: 'Optimize', action: 'optimize' },
                { label: 'Review', action: 'review' },
                { label: 'Tests', action: 'test' },
                { label: 'Docs', action: 'document' }
            ],
            error: [
                { label: 'Diagnose', action: 'diagnose' },
                { label: 'Fix', action: 'fix' },
                { label: 'Explain', action: 'explain' }
            ],
            text: [
                { label: 'Rewrite', action: 'rewrite' },
                { label: 'Simplify', action: 'simplify' },
                { label: 'Summarize', action: 'summarize' },
                { label: 'Translate', action: 'translate' },
                { label: 'Reply', action: 'reply' },
                { label: 'Define', action: 'define' },
                { label: 'Search', action: 'search' }
            ]
        };

        const TYPE_LABELS = {
            code: { label: '< >', cls: 'type-code' },
            error: { label: 'ERR', cls: 'type-error' },
            text: { label: 'TXT', cls: 'type-text' }
        };

        let currentContentType = 'text';
        let customActions = [];

        function renderToolbar(contentType) {
            currentContentType = contentType;
            const toolbar = document.getElementById('toolbar');
            const actions = ACTION_SETS[contentType] || ACTION_SETS.text;
            const typeInfo = TYPE_LABELS[contentType] || TYPE_LABELS.text;

            let html = `<span class="type-badge ${typeInfo.cls}">${typeInfo.label}</span>`;

            actions.forEach((a) => {
                html += `<button class="btn" data-action="${a.action}">${a.label}</button>`;
            });

            // Custom actions filtered by content type
            const relevant = customActions.filter(ca => ca.type === 'all' || ca.type === contentType);
            if (relevant.length > 0) {
                html += '<div class="sep"></div>';
                relevant.forEach((ca) => {
                    const idx = customActions.indexOf(ca);
                    html += `<button class="btn btn-custom" data-action="custom:${idx}">${ca.label}</button>`;
                });
            }

            html += '<div class="sep"></div>';
            html += '<button class="btn btn-chat" data-action="chat">Chat \u2192</button>';

            toolbar.innerHTML = html;

            toolbar.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    ipcRenderer.send('toolbar-action', btn.dataset.action);
                });
            });

            // Signal main process that DOM is painted and window is safe to show
            ipcRenderer.send('toolbar-painted');
        }

        renderToolbar('text');

        ipcRenderer.on('set-content-type', (event, type) => {
            renderToolbar(type);
        });

        ipcRenderer.on('set-custom-actions', (event, actions) => {
            customActions = actions || [];
            renderToolbar(currentContentType);
        });

        // Feature 1: Language-aware badge — override generic type badge with detected language
        ipcRenderer.on('set-language', (event, langInfo) => {
            if (!langInfo) return;
            const badge = document.querySelector('.type-badge');
            if (badge) {
                badge.textContent = langInfo.badge;
                badge.className = 'type-badge type-code';
                badge.title = langInfo.label;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') ipcRenderer.send('toolbar-dismiss');

            const toolbar = document.getElementById('toolbar');
            const buttons = toolbar.querySelectorAll('.btn:not(.btn-chat)');
            if (e.key >= '1' && e.key <= '9') {
                const idx = parseInt(e.key) - 1;
                if (idx < buttons.length) {
                    e.preventDefault();
                    buttons[idx].click();
                }
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                ipcRenderer.send('toolbar-action', 'chat');
            }
        });
    </script>
</body>

</html>
