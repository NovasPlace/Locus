<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Blueprint Printer</title>
    <style>
        :root {
            --navy: #0a0f1e;
            --navy-light: #0d1428;
            --navy-card: #111827;
            --cyan: #00bcd4;
            --cyan-dim: rgba(0, 188, 212, 0.18);
            --cyan-glow: rgba(0, 188, 212, 0.5);
            --cyan-faint: rgba(0, 188, 212, 0.07);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #475569;
            --border: rgba(0, 188, 212, 0.15);
            --border-med: rgba(0, 188, 212, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--navy);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            line-height: 1.65;
        }

        /* ── Dot grid background ─────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0, 188, 212, 0.18) 1px, transparent 1px);
            background-size: 22px 22px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Hinge swing animation — opens from right edge of main window ── */
        @keyframes hingeOpen {
            from {
                transform-origin: left center;
                transform: perspective(1400px) rotateY(-72deg);
                opacity: 0;
            }

            to {
                transform-origin: left center;
                transform: perspective(1400px) rotateY(0deg);
                opacity: 1;
            }
        }

        @keyframes hingeClose {
            from {
                transform-origin: left center;
                transform: perspective(1400px) rotateY(0deg);
                opacity: 1;
            }

            to {
                transform-origin: left center;
                transform: perspective(1400px) rotateY(-72deg);
                opacity: 0;
            }
        }

        .panel {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transform-origin: left center;
            animation: hingeOpen 280ms cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            z-index: 1;
        }

        .panel.closing {
            animation: hingeClose 210ms cubic-bezier(0.55, 0, 0.55, 0.2) forwards;
        }

        /* ── Cyan connector strip (left edge) ──── */
        .connector {
            position: fixed;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg,
                    transparent 0%,
                    var(--cyan) 20%,
                    var(--cyan-glow) 50%,
                    var(--cyan) 80%,
                    transparent 100%);
            box-shadow: 0 0 12px var(--cyan-glow), 0 0 24px rgba(0, 188, 212, 0.2);
            z-index: 10;
        }

        /* Amber right connector — hinge point for Deep Dive panel */
        .connector-right {
            position: fixed;
            right: 0;
            top: 0;
            width: 4px;
            height: 100vh;
            background: linear-gradient(180deg,
                    transparent 0%,
                    rgba(245, 166, 35, 0.2) 30%,
                    rgba(245, 166, 35, 0.4) 50%,
                    rgba(245, 166, 35, 0.2) 70%,
                    transparent 100%);
            box-shadow: 0 0 6px rgba(245, 166, 35, 0.15);
            z-index: 10;
            transition: box-shadow 0.3s, background 0.3s;
        }

        .connector-right.active {
            background: linear-gradient(180deg,
                    transparent 0%,
                    rgba(245, 166, 35, 0.6) 30%,
                    rgba(245, 166, 35, 1) 50%,
                    rgba(245, 166, 35, 0.6) 70%,
                    transparent 100%);
            box-shadow: 0 0 12px rgba(245, 166, 35, 0.5), 0 0 24px rgba(245, 166, 35, 0.2);
        }

        /* Connector pulse — flares on data flow */
        @keyframes connectorPulse {
            0% {
                box-shadow: 0 0 12px rgba(245, 166, 35, 0.5);
            }

            50% {
                box-shadow: 0 0 28px rgba(245, 166, 35, 0.9), 0 0 48px rgba(245, 166, 35, 0.4);
            }

            100% {
                box-shadow: 0 0 12px rgba(245, 166, 35, 0.5);
            }
        }

        .connector-right.pulse {
            animation: connectorPulse 400ms ease-out;
        }


        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px 10px 18px;
            background: rgba(10, 15, 30, 0.9);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .header-icon {
            font-size: 15px;
            filter: drop-shadow(0 0 6px var(--cyan-glow));
        }

        .header-title {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--cyan);
            letter-spacing: 0.04em;
            text-shadow: 0 0 10px var(--cyan-glow);
            flex: 1;
        }

        .header-session {
            font-size: 10px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .close-btn {
            -webkit-app-region: no-drag;
            background: none;
            border: 1px solid rgba(0, 188, 212, 0.2);
            color: var(--text-muted);
            width: 22px;
            height: 22px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .close-btn:hover {
            background: rgba(248, 81, 73, 0.15);
            border-color: rgba(248, 81, 73, 0.4);
            color: #f85149;
        }

        /* ── Progress bar ───────────────────────── */
        .progress-wrap {
            height: 2px;
            background: var(--navy-light);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), rgba(0, 188, 212, 0.4));
            transition: width 0.4s ease;
            box-shadow: 0 0 8px var(--cyan-glow);
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 40px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5));
            animation: shimmer 1.2s linear infinite;
        }

        @keyframes shimmer {
            from {
                opacity: 0.3;
            }

            to {
                opacity: 1;
            }
        }

        .progress-bar.done::after {
            display: none;
        }

        /* ── Status bar (below progress) ───────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px 4px 18px;
            background: var(--navy-light);
            border-bottom: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-dim);
            font-font: monospace;
            flex-shrink: 0;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--cyan);
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 4px var(--cyan);
            }

            50% {
                opacity: 0.3;
                box-shadow: none;
            }
        }

        .status-dot.done {
            animation: none;
            background: #3fb950;
            box-shadow: 0 0 4px rgba(63, 185, 80, 0.6);
        }

        /* ── Scroll content ─────────────────────── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 18px 16px 18px 44px;
            /* left pad for annotations */
            position: relative;
            scrollbar-width: auto;
            scrollbar-color: rgba(0, 188, 212, 0.45) rgba(0, 0, 0, 0.2);
        }

        .content::-webkit-scrollbar {
            width: 9px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 6px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(0, 188, 212, 0.45);
            border-radius: 6px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 188, 212, 0.75);
            background-clip: content-box;
        }

        /* ── Blueprint markdown ─────────────────── */
        .blueprint {
            position: relative;
        }

        .blueprint h1 {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 17px;
            font-weight: 700;
            color: var(--cyan);
            text-shadow: 0 0 14px var(--cyan-glow);
            margin-bottom: 6px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border-med);
            letter-spacing: 0.02em;
        }

        .blueprint h2 {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--cyan);
            margin-top: 20px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.85;
        }

        .blueprint h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            margin-top: 14px;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            opacity: 0.75;
        }

        .blueprint p {
            color: var(--text);
            margin-bottom: 10px;
            font-size: 12.5px;
            line-height: 1.7;
        }

        .blueprint ul,
        .blueprint ol {
            padding-left: 18px;
            margin-bottom: 10px;
        }

        .blueprint li {
            color: var(--text);
            margin-bottom: 3px;
            font-size: 12.5px;
            position: relative;
        }

        .blueprint ul li::marker {
            content: '\25C6  ';
            color: var(--cyan);
            font-size: 8px;
        }

        .blueprint code {
            background: var(--cyan-faint);
            color: var(--cyan);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11.5px;
            border: 1px solid var(--border);
        }

        .blueprint pre {
            background: var(--navy-card);
            border: 1px solid var(--border-med);
            border-left: 3px solid var(--cyan);
            border-radius: 0 6px 6px 0;
            padding: 12px 14px;
            margin: 10px 0 14px;
            overflow-x: auto;
            box-shadow: 0 0 12px rgba(0, 188, 212, 0.06), inset 0 0 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .blueprint pre::before {
            content: attr(data-lang);
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 9px;
            color: var(--cyan);
            opacity: 0.5;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .blueprint pre code {
            background: transparent;
            border: none;
            padding: 0;
            color: var(--text);
            font-size: 12px;
            line-height: 1.6;
        }

        .blueprint hr {
            border: none;
            border-top: 1px solid rgba(0, 188, 212, 0.25);
            margin: 14px 0;
        }

        .blueprint hr.section-sep {
            border-top: 1px solid rgba(0, 188, 212, 0.18);
            margin: 6px 0 16px;
            background: linear-gradient(90deg, rgba(0, 188, 212, 0.12), transparent);
            height: 1px;
            border: none;
        }

        /* key term: **Term:** coloring in bullet points */
        .key-term {
            color: var(--cyan);
            font-weight: 600;
        }

        .blueprint blockquote {
            border-left: 2px solid var(--cyan);
            padding: 6px 12px;
            margin: 10px 0;
            background: var(--cyan-faint);
            color: var(--text-muted);
            font-style: italic;
            font-size: 12px;
        }

        .blueprint strong {
            color: var(--cyan);
            font-weight: 600;
        }

        .blueprint em {
            color: var(--text-muted);
        }

        .blueprint table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0 14px;
            font-size: 11.5px;
        }

        .blueprint th {
            background: var(--cyan-faint);
            color: var(--cyan);
            font-weight: 600;
            padding: 6px 10px;
            border: 1px solid var(--border);
            text-align: left;
            font-family: monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .blueprint td {
            padding: 5px 10px;
            border: 1px solid var(--border);
            color: var(--text);
        }

        /* ── Section annotations (§ in left margin) */
        .section-annotation {
            position: absolute;
            left: -34px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--cyan);
            opacity: 0.45;
            letter-spacing: 0.02em;
            white-space: nowrap;
            top: 1px;
        }

        .annotated {
            position: relative;
        }

        /* ── Typewriter cursor ──────────────────── */
        .tw-cursor {
            display: inline-block;
            width: 2px;
            height: 14px;
            background: var(--cyan);
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: blink 0.75s step-end infinite;
            box-shadow: 0 0 6px var(--cyan-glow);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── Preview state (confirm before generate) ── */
        #preview-state {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 8px;
        }

        .preview-label {
            font-family: monospace;
            font-size: 9px;
            color: var(--cyan);
            letter-spacing: 0.1em;
            opacity: 0.7;
        }

        .preview-card {
            background: var(--navy-card);
            border: 1px solid var(--border-med);
            border-left: 2px solid var(--cyan);
            border-radius: 0 4px 4px 0;
            padding: 10px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            color: var(--text-muted);
            line-height: 1.6;
            max-height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .preview-hint {
            font-size: 11px;
            color: var(--text-dim);
            font-style: italic;
        }

        .btn-generate {
            width: 100%;
            padding: 11px 0;
            background: var(--cyan);
            border: none;
            border-radius: 5px;
            color: var(--navy);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            box-shadow: 0 0 14px var(--cyan-glow);
            transition: box-shadow 0.15s, transform 0.1s;
        }

        .btn-generate:hover {
            box-shadow: 0 0 22px var(--cyan-glow);
            transform: translateY(-1px);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate-cancel {
            width: 100%;
            padding: 7px 0;
            background: none;
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 4px;
            color: rgba(248, 81, 73, 0.7);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-generate-cancel:hover {
            background: rgba(248, 81, 73, 0.1);
            border-color: rgba(248, 81, 73, 0.5);
            color: #f85149;
        }

        /* ── Loading state ──────────────────────── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 14px;
            padding-top: 8px;
        }

        .loading-prompt {
            font-size: 11.5px;
            color: var(--text-muted);
            background: var(--cyan-faint);
            border: 1px solid var(--border);
            border-left: 2px solid var(--cyan);
            padding: 8px 12px;
            border-radius: 0 4px 4px 0;
            font-style: italic;
            line-height: 1.5;
            max-width: 100%;
            word-break: break-word;
        }

        .scanning-lines {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .scan-line {
            height: 6px;
            background: var(--cyan-faint);
            border-radius: 3px;
            animation: scanAnim 2s ease-in-out infinite;
        }

        .scan-line:nth-child(1) {
            width: 85%;
            animation-delay: 0s;
        }

        .scan-line:nth-child(2) {
            width: 65%;
            animation-delay: 0.15s;
        }

        .scan-line:nth-child(3) {
            width: 78%;
            animation-delay: 0.3s;
        }

        .scan-line:nth-child(4) {
            width: 55%;
            animation-delay: 0.45s;
        }

        .scan-line:nth-child(5) {
            width: 90%;
            animation-delay: 0.6s;
        }

        .scan-line:nth-child(6) {
            width: 40%;
            animation-delay: 0.75s;
        }

        @keyframes scanAnim {

            0%,
            100% {
                opacity: 0.15;
            }

            50% {
                opacity: 0.45;
                background: rgba(0, 188, 212, 0.25);
            }
        }

        /* ── Footer ─────────────────────────────── */
        .footer {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px 10px 18px;
            background: rgba(10, 15, 30, 0.95);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .footer-meta {
            flex: 1;
            font-size: 9px;
            color: var(--text-dim);
            font-family: monospace;
            letter-spacing: 0.04em;
        }

        .btn {
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-med);
            background: var(--cyan-faint);
            color: var(--cyan);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: monospace;
            letter-spacing: 0.03em;
        }

        .btn:hover {
            background: var(--cyan-dim);
            border-color: var(--cyan);
            box-shadow: 0 0 8px var(--cyan-glow);
            text-shadow: 0 0 6px var(--cyan-glow);
        }

        .btn.success {
            color: #3fb950;
            border-color: rgba(63, 185, 80, 0.4);
            background: rgba(63, 185, 80, 0.1);
        }

        /* ── Error state ────────────────────────── */
        .error-state {
            padding: 16px 0;
            color: #f85149;
            font-size: 12px;
            border-left: 2px solid rgba(248, 81, 73, 0.4);
            padding-left: 12px;
        }

        .error-state .err-icon {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .error-state .err-msg {
            color: #ff7b72;
        }

        /* ── Mode Select ───────────────────────────────────────────── */
        #mode-select {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px 20px;
            height: 100%;
        }

        #mode-select .mode-prompt {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        #mode-select .mode-context {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 8px;
            font-style: italic;
            max-width: 340px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mode-cards {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        .mode-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 22px 16px;
            border-radius: 8px;
            border: 1px solid;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
            background: transparent;
        }

        .mode-card:hover {
            transform: translateY(-2px);
        }

        .mode-card .card-icon {
            font-size: 26px;
        }

        .mode-card .card-title {
            font-family: monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .mode-card .card-desc {
            font-size: 10px;
            opacity: 0.6;
            line-height: 1.4;
        }

        .mode-card.blueprint {
            border-color: rgba(0, 188, 212, 0.45);
            color: #00bcd4;
        }

        .mode-card.blueprint:hover {
            background: rgba(0, 188, 212, 0.07);
            border-color: rgba(0, 188, 212, 0.7);
            box-shadow: 0 0 18px rgba(0, 188, 212, 0.2);
        }

        .mode-card.teach {
            border-color: rgba(245, 166, 35, 0.45);
            color: #f5a623;
        }

        .mode-card.teach:hover {
            background: rgba(245, 166, 35, 0.07);
            border-color: rgba(245, 166, 35, 0.7);
            box-shadow: 0 0 18px rgba(245, 166, 35, 0.2);
        }

        .btn-reset {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.15s;
        }

        .btn-reset:hover {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body>
    <!-- Amber right connector (hinge to Deep Dive panel) -->
    <div class="connector-right" id="connector-right"></div>
    <div class="connector"></div>
    <div class="panel" id="panel">

        <!-- Header -->
        <div class="header">
            <span class="header-icon" id="header-icon">⚡</span>
            <span class="header-title" id="header-title">ANALYSIS PANEL</span>
            <span class="header-session" id="session-id"></span>
            <button class="btn-reset" id="btn-reset" title="Choose a different mode" style="display:none">⟳</button>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
        </div>

        <!-- Status -->
        <div class="status-bar">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Ready — review context below</span>
        </div>

        <!-- Content -->
        <div class="content" id="content">

            <!-- Mode select (default state when opened via Expand Workspace) -->
            <div id="mode-select" style="display:none">
                <div class="mode-prompt">Choose a mode</div>
                <div class="mode-context" id="mode-context-preview"></div>
                <div class="mode-cards">
                    <div class="mode-card blueprint" id="card-blueprint">
                        <span class="card-icon">🔧</span>
                        <span class="card-title">Blueprint</span>
                        <span class="card-desc">Generate a technical architecture breakdown</span>
                    </div>
                    <div class="mode-card teach" id="card-teach">
                        <span class="card-icon">📖</span>
                        <span class="card-title">Teach Me</span>
                        <span class="card-desc">Explain this concept step by step</span>
                    </div>
                </div>
            </div>

            <!-- Preview state (before generation) -->
            <div id="preview-state" style="display:none">
                <div class="preview-label">CONTEXT</div>
                <div class="preview-card" id="preview-text"></div>
                <div class="preview-hint">Review what will be sent, then confirm below.</div>
                <button class="btn-generate" id="btn-generate">▶ GENERATE BLUEPRINT</button>
                <button class="btn-generate-cancel" id="btn-preview-cancel">✕ Cancel</button>
            </div>

            <div class="loading-state" id="loading-state" style="display:none">
                <div class="loading-prompt" id="loading-prompt"></div>
                <div class="scanning-lines">
                    <div class="scan-line"></div>
                    <div class="scan-line"></div>
                    <div class="scan-line"></div>
                    <div class="scan-line"></div>
                    <div class="scan-line"></div>
                    <div class="scan-line"></div>
                </div>
            </div>
        </div>

        <!-- Footer (shown after generation) -->
        <div class="footer" id="footer" style="display:none">
            <span class="footer-meta" id="footer-meta"></span>
            <button class="btn" id="btn-dive"
                style="color:#f5a623;border-color:rgba(245,166,35,0.4);background:rgba(245,166,35,0.06)"
                title="Open Deep Dive — analyse a section further">🔎 Dive</button>
            <button class="btn" id="btn-chat" title="Send blueprint to Locus chat">💬 Chat</button>
            <button class="btn" id="btn-copy">📋 Copy</button>
            <button class="btn" id="btn-save">💾 Save</button>
            <button class="btn" id="btn-terminal"
                style="color:#f5a623;border-color:rgba(245,166,35,0.3);background:rgba(245,166,35,0.05)"
                title="Open Terminal panel">⌘ Terminal</button>
        </div>

        <!-- Cancel bar (shown during generation) -->
        <div class="footer" id="cancel-bar">
            <span class="footer-meta" id="cancel-meta">Generating…</span>
            <button class="btn" id="btn-cancel"
                style="color:#f85149;border-color:rgba(248,81,73,0.4);background:rgba(248,81,73,0.06)"
                title="Cancel generation">🛑 Cancel</button>
        </div>

    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let sectionCount = 0;
        let twTimer = null;
        let fullText = '';
        let currentBlueprint = '';
        const startMs = Date.now();

        // ── Helpers ────────────────────────────────────
        function setStatus(text, done = false) {
            document.getElementById('status-text').textContent = text;
            const dot = document.getElementById('status-dot');
            if (done) dot.classList.add('done'); else dot.classList.remove('done');
        }

        function setProgress(pct, done = false) {
            const bar = document.getElementById('progress-bar');
            bar.style.width = Math.min(pct, 100) + '%';
            if (done) bar.classList.add('done');
        }

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Inline markdown renderer — same approach as Locus index.html but extended
        function renderMd(text) {
            let sectionIdx = 0;
            const codeBlocks = [];

            // Strip === separator lines BEFORE HTML escaping (they'd become &amp;= etc)
            // Replace lines of 4+ '=' with a section-sep placeholder
            text = text.replace(/^={4,}\s*$/gm, '\x00SEP\x00');

            // Extract code blocks first
            let out = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                const escaped = escHtml(code.trim());
                const idx = codeBlocks.length;
                codeBlocks.push(`<pre data-lang="${escHtml(lang || 'code')}"><code>${escaped}</code></pre>`);
                return `\x00CB${idx}\x00`;
            });

            // Escape remaining HTML
            out = out.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Restore sep placeholders → styled hr
            out = out.replace(/\x00SEP\x00/g, '<hr class="section-sep">');

            // Inline code
            out = out.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Headings — h2 gets a section annotation in left margin
            out = out.replace(/^### (.+)$/gm, (_, t) => `<h3>${t}</h3>`);
            out = out.replace(/^## (.+)$/gm, (_, t) => {
                sectionIdx++;
                return `<h2 class="annotated"><span class="section-annotation">§${sectionIdx}.0</span>${t}</h2>`;
            });
            out = out.replace(/^# (.+)$/gm, (_, t) => `<h1>${t}</h1>`);

            // Tables (basic)
            out = out.replace(/^\|(.+)\|$/gm, row => {
                const cells = row.split('|').slice(1, -1).map(c => c.trim());
                return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
            });
            out = out.replace(/(<tr>.*<\/tr>\n)+/g, m => {
                const rows = m.trim().split('\n');
                const header = rows[0].replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>');
                const body = rows.slice(2).join('\n');
                return `<table>${header}${body}</table>`;
            });

            // Bold-colon key terms: **Term:** → <span class="key-term">Term:</span>
            // Must run BEFORE generic bold so it takes priority
            out = out.replace(/\*\*([^*]+?):\*\*/g, '<span class="key-term">$1:</span>');

            // Bold, italic
            out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            out = out.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // List items
            out = out.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
            out = out.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            out = out.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

            // Blockquote
            out = out.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // HR (---)
            out = out.replace(/^---$/gm, '<hr>');

            // Paragraphs (double newline)
            out = out.replace(/\n{2,}/g, '</p><p>');
            out = '<p>' + out + '</p>';
            out = out.replace(/<p><\/p>/g, '').replace(/<p>(<h[1-3]|<ul|<pre|<table|<hr|<blockquote)/g, '$1');
            out = out.replace(/(<\/h[1-3]>|<\/ul>|<\/pre>|<\/table>|<hr>|<\/blockquote>)<\/p>/g, '$1');

            // Single newlines
            out = out.replace(/\n/g, '<br>');

            // Restore code blocks
            codeBlocks.forEach((block, i) => {
                out = out.replace(`\x00CB${i}\x00`, block);
            });

            return out;
        }

        // ── Typewriter effect ──────────────────────────
        function typewrite(html, container, speed = 6) {
            // We render the HTML via innerHTML (it's safe — we built it from escHtml)
            // then animate each text node
            container.innerHTML = '';
            const buf = document.createElement('div');
            buf.className = 'blueprint';
            container.appendChild(buf);
            buf.innerHTML = html;

            // Add blinking cursor after last text node
            const cursor = document.createElement('span');
            cursor.className = 'tw-cursor';

            const walker = document.createTreeWalker(buf, NodeFilter.SHOW_TEXT);
            const textNodes = [];
            let node;
            while (node = walker.nextNode()) { textNodes.push(node); }

            // Collect all text, replace with empty, type them in
            textNodes.forEach(n => { n._full = n.nodeValue; n.nodeValue = ''; });

            let ni = 0, ci = 0;

            // Place cursor after the last element
            buf.appendChild(cursor);

            function tick() {
                if (ni >= textNodes.length) {
                    cursor.remove();
                    return;
                }
                const tn = textNodes[ni];
                const full = tn._full;
                // Type SPEED chars per tick
                ci += speed;
                tn.nodeValue = full.slice(0, ci);
                if (ci >= full.length) { tn.nodeValue = full; ni++; ci = 0; }
                // Move cursor
                if (tn.parentNode) tn.parentNode.appendChild(cursor);
                document.getElementById('content').scrollTop = 9999;
                twTimer = requestAnimationFrame(tick);
            }
            twTimer = requestAnimationFrame(tick);
        }

        let _pendingText = '';   // stored while in preview state
        let _pendingMode = 'blueprint';

        // ── Mode-select helper ─────────────────────────────
        function showModeSelect(text) {
            _pendingText = text || '';
            // Show context snippet in mode-select
            const snippet = _pendingText.slice(0, 80) + (_pendingText.length > 80 ? '\u2026' : '');
            document.getElementById('mode-context-preview').textContent = snippet;
            document.getElementById('mode-select').style.display = 'flex';
            document.getElementById('preview-state').style.display = 'none';
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('cancel-bar').style.display = 'none';
            document.getElementById('footer').style.display = 'none';
            document.getElementById('btn-reset').style.display = 'none';
            // Reset header to neutral
            document.getElementById('header-icon').textContent = '\u26a1';
            document.getElementById('header-title').textContent = 'ANALYSIS PANEL';
            document.getElementById('header-title').style.color = '';
            document.getElementById('header-title').style.textShadow = '';
            setStatus('Ready \u2014 choose a mode below');
            setProgress(0);
        }

        // Receive mode-select state from expand-workspace
        ipcRenderer.on('bp-mode-select', (_, data) => showModeSelect(data.text));

        // Mode card click handlers
        document.getElementById('card-blueprint').addEventListener('click', () => {
            document.getElementById('mode-select').style.display = 'none';
            document.getElementById('btn-reset').style.display = 'inline-block';
            _pendingMode = 'blueprint';
            document.getElementById('header-icon').textContent = '\ud83d\udd27';
            document.getElementById('header-title').textContent = 'BLUEPRINT PRINTER';
            document.getElementById('header-title').style.color = '#00bcd4';
            document.getElementById('header-title').style.textShadow = '0 0 10px rgba(0,188,212,0.4)';
            document.getElementById('btn-generate').style.background = '';
            document.getElementById('btn-generate').style.boxShadow = '';
            document.getElementById('btn-generate').textContent = '\u25b6 GENERATE BLUEPRINT';
            const display = _pendingText.length > 500 ? _pendingText.slice(0, 500) + '\u2026' : _pendingText;
            document.getElementById('preview-text').textContent = display;
            document.getElementById('preview-state').style.display = 'flex';
            document.getElementById('loading-state').style.display = 'none';
            setStatus('Ready \u2014 review context below');
        });

        document.getElementById('card-teach').addEventListener('click', () => {
            document.getElementById('mode-select').style.display = 'none';
            document.getElementById('btn-reset').style.display = 'inline-block';
            _pendingMode = 'teach';
            document.getElementById('header-icon').textContent = '\ud83d\udcd6';
            document.getElementById('header-title').textContent = 'TEACH MODE';
            document.getElementById('header-title').style.color = '#f5a623';
            document.getElementById('header-title').style.textShadow = '0 0 10px rgba(245,166,35,0.5)';
            document.getElementById('btn-generate').style.background = '#f5a623';
            document.getElementById('btn-generate').style.boxShadow = '0 0 14px rgba(245,166,35,0.5)';
            document.getElementById('btn-generate').textContent = '\u25b6 TEACH ME';
            const display = _pendingText.length > 500 ? _pendingText.slice(0, 500) + '\u2026' : _pendingText;
            document.getElementById('preview-text').textContent = display;
            document.getElementById('preview-state').style.display = 'flex';
            document.getElementById('loading-state').style.display = 'none';
            setStatus('Ready \u2014 review context below');
        });

        // Reset button — go back to mode select
        document.getElementById('btn-reset').addEventListener('click', () => showModeSelect(_pendingText));

        // ── IPC listeners ──────────────────────────────

        // Preview state — shown immediately when user hits Print/Teach from toolbar shortcuts
        ipcRenderer.on('bp-preview', (_, data) => {
            _pendingText = data.text || '';
            _pendingMode = data.mode || 'blueprint';

            // Switch header for teach mode
            if (_pendingMode === 'teach') {
                document.getElementById('header-icon').textContent = '\ud83d\udcd6';
                document.getElementById('header-title').textContent = 'TEACH MODE';
                document.getElementById('header-title').style.color = '#f5a623';
                document.getElementById('header-title').style.textShadow = '0 0 10px rgba(245,166,35,0.5)';
                document.getElementById('btn-generate').style.background = '#f5a623';
                document.getElementById('btn-generate').style.boxShadow = '0 0 14px rgba(245,166,35,0.5)';
                document.getElementById('btn-generate').textContent = '\u25b6 TEACH ME';
            } else {
                document.getElementById('header-icon').textContent = '\ud83d\udd27';
                document.getElementById('header-title').textContent = 'BLUEPRINT PRINTER';
                document.getElementById('header-title').style.color = '#00bcd4';
                document.getElementById('header-title').style.textShadow = '0 0 10px rgba(0,188,212,0.4)';
                document.getElementById('btn-generate').textContent = '\u25b6 GENERATE BLUEPRINT';
            }

            // Populate context card
            const display = _pendingText.length > 500
                ? _pendingText.slice(0, 500) + '\u2026' : _pendingText;
            document.getElementById('preview-text').textContent = display;

            // Show preview, hide loading
            document.getElementById('preview-state').style.display = 'flex';
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('cancel-bar').style.display = 'none';
            document.getElementById('mode-select').style.display = 'none';
            setStatus('Ready \u2014 review context below');
            setProgress(0);
        });

        // Generate button — deliberate confirm
        document.getElementById('btn-generate').addEventListener('click', () => {
            document.getElementById('preview-state').style.display = 'none';
            document.getElementById('loading-state').style.display = 'flex';
            document.getElementById('cancel-bar').style.display = 'flex';
            setStatus('Dispatching\u2026');
            if (_pendingMode === 'teach') {
                ipcRenderer.send('teach-start', _pendingText);
            } else {
                ipcRenderer.send('blueprint-start', _pendingText);
            }
        });

        // Cancel from preview — close without generating
        document.getElementById('btn-preview-cancel').addEventListener('click', () => {
            closePanel();
        });

        ipcRenderer.on('bp-init', (_, data) => {
            // Switch header based on mode
            if (data.mode === 'teach') {
                document.querySelector('.header-icon').textContent = '📖';
                document.querySelector('.header-title').textContent = 'TEACH MODE';
                document.querySelector('.header-title').style.color = '#f5a623';
                document.querySelector('.header-title').style.textShadow = '0 0 10px rgba(245,166,35,0.5)';
            }
            // Show prompt snippet (teach: strip preamble, show only the user's content)
            let displayPrompt = data.prompt;
            if (data.mode === 'teach') {
                // The teach prompt has a blank line between instructions and content
                const blankLine = data.prompt.indexOf('\n\n');
                if (blankLine !== -1) displayPrompt = data.prompt.slice(blankLine + 2).trim();
            }
            document.getElementById('loading-prompt').textContent =
                displayPrompt.length > 180 ? displayPrompt.slice(0, 180) + '…' : displayPrompt;
            if (data.sessionId) {
                document.getElementById('session-id').textContent = data.sessionId.slice(0, 8);
            }
            setStatus('Dispatching to Manifesto Engine…');
            setProgress(5);
        });

        ipcRenderer.on('bp-progress', (_, ev) => {
            const pct = Math.min(ev.pct || 0, 98);
            setProgress(pct);
            setStatus(ev.status || ev.stage || 'Generating…');
        });

        ipcRenderer.on('bp-ready', (_, data) => {
            if (twTimer) cancelAnimationFrame(twTimer);

            // Hide cancel bar, show footer
            document.getElementById('cancel-bar').style.display = 'none';

            currentBlueprint = data.manifesto || '';
            setProgress(100, true);
            setStatus('Blueprint ready ✓', true);

            const elapsed = ((Date.now() - startMs) / 1000).toFixed(1);
            const meta = [];
            if (data.blueprint_type) meta.push(data.blueprint_type);
            if (data.domains_matched?.length) meta.push(data.domains_matched.join(', '));
            meta.push(elapsed + 's');
            document.getElementById('footer-meta').textContent = meta.join(' · ');

            // Clear loading, start typewriter
            const content = document.getElementById('content');
            document.getElementById('loading-state').style.display = 'none';

            const rendered = renderMd(currentBlueprint);
            typewrite(rendered, content, 8); // 8 chars per frame ≈ smooth

            document.getElementById('footer').style.display = 'flex';
        });

        ipcRenderer.on('bp-error', (_, msg) => {
            if (twTimer) cancelAnimationFrame(twTimer);
            // Hide cancel bar on error
            document.getElementById('cancel-bar').style.display = 'none';
            setStatus('Error', true);
            setProgress(100, true);
            document.getElementById('progress-bar').style.background = '#f85149';

            document.getElementById('loading-state').innerHTML = `
                <div class="error-state">
                    <div class="err-icon">⚠️</div>
                    <div style="font-weight:600;color:#f85149;margin-bottom:4px">Generation failed</div>
                    <div class="err-msg">${escHtml(msg)}</div>
                </div>`;
        });

        // ── Close / ESC ───────────────────────────────
        function closePanel() {
            const panel = document.getElementById('panel');
            panel.classList.add('closing');
            setTimeout(() => ipcRenderer.send('blueprint-panel-close'), 220);
        }

        document.getElementById('close-btn').addEventListener('click', closePanel);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

        // ── Cancel ───────────────────────────────────
        document.getElementById('btn-cancel').addEventListener('click', () => {
            ipcRenderer.send('blueprint-cancel');
            closePanel();
        });

        // ── Copy / Save ───────────────────────────────
        document.getElementById('btn-copy').addEventListener('click', () => {
            ipcRenderer.send('blueprint-copy', currentBlueprint);
            const btn = document.getElementById('btn-copy');
            btn.textContent = '✓ Copied';
            btn.classList.add('success');
            setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('success'); }, 2000);
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            ipcRenderer.send('blueprint-save', currentBlueprint);
            document.getElementById('btn-save').textContent = '✓ Saving…';
        });

        let _deepDiveOpen = false;

        document.getElementById('btn-dive').addEventListener('click', () => {
            if (_deepDiveOpen) {
                ipcRenderer.send('deep-dive-close');
                _deepDiveOpen = false;
                document.getElementById('connector-right').classList.remove('active');
                document.getElementById('btn-dive').textContent = '🔎 Dive';
            } else {
                ipcRenderer.send('deep-dive-open', { text: currentBlueprint, source: 'blueprint' });
                _deepDiveOpen = true;
                document.getElementById('connector-right').classList.add('active');
                document.getElementById('btn-dive').textContent = '◀ Close Dive';
            }
        });

        // When deep dive closes from its own X button, dim the connector too
        ipcRenderer.on('deep-dive-closed', () => {
            _deepDiveOpen = false;
            document.getElementById('connector-right').classList.remove('active');
            document.getElementById('btn-dive').textContent = '🔎 Dive';
        });

        document.getElementById('btn-chat').addEventListener('click', () => {
            ipcRenderer.send('blueprint-send-to-chat', currentBlueprint);
            const btn = document.getElementById('btn-chat');
            btn.textContent = '✓ Sent';
            btn.classList.add('success');
            setTimeout(() => { btn.textContent = '💬 Chat'; btn.classList.remove('success'); }, 2000);
        });

        // ── Close panel IPC (cascade close) ───────────────────────
        ipcRenderer.on('close-panel', () => {
            const panel = document.querySelector('.panel');
            if (panel) {
                panel.classList.add('closing');
                setTimeout(() => window.close(), 220);
            } else {
                window.close();
            }
        });

        // ── Connector pulse helper ───────────────────────────────
        function pulseConnector(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('pulse');
            void el.offsetWidth; // force reflow
            el.classList.add('pulse');
            setTimeout(() => el.classList.remove('pulse'), 450);
        }

        // Pulse connector on Dive open
        const origDiveBtn = document.getElementById('btn-dive');
        if (origDiveBtn) {
            const origHandler = origDiveBtn.onclick;
            origDiveBtn.addEventListener('click', () => {
                if (!_deepDiveOpen) pulseConnector('connector-right');
            });
        }

        // ── Terminal button ─────────────────────────────────────
        const termBtn = document.getElementById('btn-terminal');
        if (termBtn) {
            termBtn.addEventListener('click', () => {
                ipcRenderer.send('open-terminal');
            });
        }
    </script>
</body>

</html>
